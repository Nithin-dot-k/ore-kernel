app_id = "openclaw"
description = "Generated by ORE CLI"
version = "1.0.0"

[privacy]
enforce_pii_redaction = true

[resources]
allowed_models = ["llama3.2:1b"] 
max_tokens_per_minute = 20000
gpu_priority = "normal"
json_history = true
stateful_paging = true

[memory_limits]
max_json_tokens = 4024
max_kv_cache_mb = 1024
auto_summarize_on_cap = true

[network]
network_enabled = true
allowed_domains = ["linux-foundation.org"]
allow_localhost_access = false

[ipc]
allowed_ipc_targets = []